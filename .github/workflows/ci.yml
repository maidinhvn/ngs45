name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (package + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -q
      # Note: unit tests are pure-Python (io/config/seed). The external
      # bioinformatics tools (SPAdes, bowtie2, ITSx, ...) are only needed to
      # actually run the pipeline and are not exercised in CI.
